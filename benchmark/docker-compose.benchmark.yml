# Benchmark infrastructure: all three memory systems running locally.
#
# Usage:
#   docker compose -f benchmark/docker-compose.benchmark.yml up -d --wait
#   python benchmark/run_benchmark.py
#   docker compose -f benchmark/docker-compose.benchmark.yml down -v

services:
  # ---- MemForge (Postgres 17 + pgvector + AGE) ----
  memforge-postgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile.postgres
    environment:
      POSTGRES_USER: memforge
      POSTGRES_PASSWORD: memforge_dev
      POSTGRES_DB: memforge
    ports:
      - '5432:5432'
    volumes:
      - memforge-pgdata:/var/lib/postgresql/data
      - ../init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U memforge']
      interval: 3s
      timeout: 3s
      retries: 10
    command: >
      postgres
        -c shared_preload_libraries=age
        -c search_path=ag_catalog,"$$user",public

  memforge:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - '3100:3100'
    environment:
      DATABASE_URL: postgresql://memforge:memforge_dev@memforge-postgres:5432/memforge
      EMBEDDING_PROVIDER: local
      MEMFORGE_PORT: 3100
      NODE_ENV: production
    depends_on:
      memforge-postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3100/health']
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Graphiti (Neo4j 5.26) ----
  neo4j:
    image: neo4j:5.26.2
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: neo4j/demodemo
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -u neo4j -p demodemo "RETURN 1" || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  memforge-pgdata:
  neo4j-data:
