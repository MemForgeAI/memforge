services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    environment:
      POSTGRES_USER: memforge
      POSTGRES_PASSWORD: memforge_dev
      POSTGRES_DB: memforge
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U memforge']
      interval: 3s
      timeout: 3s
      retries: 10
    command: >
      postgres
        -c shared_preload_libraries=age
        -c search_path=ag_catalog,"$$user",public

  memforge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3100:3100'
    environment:
      DATABASE_URL: postgresql://memforge:memforge_dev@postgres:5432/memforge
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMFORGE_PORT: 3100
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      LLM_EXTRACTION_ENABLED: ${LLM_EXTRACTION_ENABLED:-false}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-gpt-5.2-chat}
      AZURE_EMBEDDING_ENDPOINT: ${AZURE_EMBEDDING_ENDPOINT:-}
      QUERY_DECOMPOSITION_ENABLED: ${QUERY_DECOMPOSITION_ENABLED:-true}
      AGENTIC_RECALL_ENABLED: ${AGENTIC_RECALL_ENABLED:-false}
      AZURE_CHAT_ENDPOINT: ${AZURE_CHAT_ENDPOINT:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3100/health']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
