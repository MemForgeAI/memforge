name: Bug Report
description: Report a bug in MemForge
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start the server with...
        2. Call the remember tool with...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MemForge Version
      placeholder: "0.1.0"
  - type: dropdown
    id: embedding
    attributes:
      label: Embedding Provider
      options:
        - local (all-MiniLM-L6-v2)
        - openai (text-embedding-3-small)
        - azure (text-embedding-3-large)
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell
